<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TejChat | Streamer Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 300px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }
        #chat-window {
            flex-grow: 1;
            background: #000;
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        h1 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; margin: 0; }
        .status { color: #4caf50; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .status::before { content: ""; width: 8px; height: 8px; background: #4caf50; border-radius: 50%; display: inline-block; }
        
        /* Reusing message styles for dashboard preview */
        .msg { padding: 12px; background: #1a1a1a; border-radius: 8px; border-left: 4px solid #5e81f4; animation: fadeIn 0.3s ease; }
        .msg.superchat { border-left-color: #ffd700; background: rgba(255, 215, 0, 0.05); }
        .msg .username { font-weight: 700; color: #5e81f4; margin-right: 10px; }
        .msg.superchat .username { color: #ffd700; }
        .msg .text { color: #ccc; }
        .yt-emoji {
            height: 20px;
            width: 20px;
            vertical-align: middle;
            object-fit: contain;
            margin: 0 2px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>YCOP Panel</h1>
        <div class="status">System Active</div>
        <div id="video-info">
            <p style="font-size: 0.8rem; color: #888;">Monitoring Video ID:</p>
            <code id="current-id" style="background: #333; padding: 4px 8px; border-radius: 4px;">Loading...</code>
        </div>
        <div style="margin-top: auto;">
            <a href="/" target="_blank" style="color: #5e81f4; text-decoration: none; font-size: 0.9rem;">View Overlay (OBS Link)</a>
        </div>
    </div>
    <div id="main">
        <div id="chat-window">
            <!-- Messages will appear here -->
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatWindow = document.getElementById('chat-window');
        const idLabel = document.getElementById('current-id');

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const legacyId = urlParams.get('v');
            const multiSources = urlParams.get('sources');
            let sources = [];

            if (multiSources) {
                sources = multiSources.split(',').map(s => {
                    const [platform, id] = s.includes(':') ? s.split(':') : ['youtube', s];
                    return { id: extractVideoId(id), platform };
                });
            } else if (legacyId) {
                sources = [{ id: extractVideoId(legacyId), platform: 'youtube' }];
            }

            if (sources.length === 0) {
                return alert("No Video ID found. Please go to the home page.");
            }

            idLabel.innerText = sources.map(s => `${s.platform}:${s.id}`).join(', ');
            socket.emit('join', { sources });
        }

        function extractVideoId(input) {
            if (!input) return null;
            const match = input.match(/(?:v=|\/live\/|\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : input.trim();
        }

        socket.on('message', (msg) => {
            const div = document.createElement('div');
            div.className = `msg ${msg.type === 'SUPERCHAT' ? 'superchat' : ''}`;
            
            const icons = {
                youtube: 'https://cdn.simpleicons.org/youtube/FF0000',
                twitch: 'https://cdn.simpleicons.org/twitch/9146FF',
                kick: 'https://cdn.simpleicons.org/kick/53FC18'
            };
            
            const platformIcon = `<img class="platform-icon" src="${icons[msg.platform] || icons.youtube}" style="width:14px; margin-right:5px; vertical-align:middle;">`;

            div.innerHTML = `
                ${platformIcon}
                <span class="username">${msg.author.name}</span>
                ${msg.type === 'SUPERCHAT' ? `<span style="color: #ffd700; font-weight: bold;">[${msg.amount}] </span>` : ''}
                <span class="text">${msg.message}</span>
            `;
            chatWindow.appendChild(div);
            // Auto scroll to bottom
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        init();
    </script>
</body>
</html>
